pre-commit:
  parallel: false
  commands:
    lint:
      run: bun run lint
    typecheck:
      run: bun run typecheck
    test:
      run: |
        if bun -e "const pkg = await Bun.file('package.json').json(); process.exit(pkg.scripts?.test ? 0 : 1)"; then
          bun run test
        else
          echo "No test script configured; skipping tests."
        fi
